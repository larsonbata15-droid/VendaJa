<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A redireccionar…</title>
<meta name="robots" content="noindex">
<style>
  html,body{height:100%;margin:0}
  body{
    display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;
    background:#fff;color:#6b7280;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;
  }
  .sp{
    width:26px;height:26px;border-radius:50%;
    border:3px solid #e5e7eb;border-top-color:#1e3a8a;
    animation:spin .7s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  a{color:#1e3a8a}
</style>
</head>
<body>
  <div class="sp"></div>
  <div>A abrir a loja…</div>
  <noscript>
    <p>Activa o JavaScript ou <a id="fallback" href="index.html">clica aqui para continuar</a>.</p>
  </noscript>

<script>
/* ═══════════════════════════════════════════════════════════
   Esta página existia como uma SEGUNDA implementação da loja
   pública. Foi substituída por um redireccionamento porque:

   1. Não verificava `is_suspended` — permitia que lojas de
      planos expirados continuassem a vender, contornando o
      sistema de assinaturas.
   2. Não suportava coleções, upsell nem página de produto.
   3. Duplicava código que divergia da versão principal.

   A loja pública vive agora só no index.html (?loja=slug).
   Este ficheiro mantém-se para não partir links antigos.
   ═══════════════════════════════════════════════════════════ */
(function () {
  var qs = location.search || '';
  // Sem parâmetros? Vai para a página inicial.
  var destino = 'index.html' + qs + location.hash;
  var link = document.getElementById('fallback');
  if (link) link.href = destino;
  // replace() para não deixar esta página no histórico do navegador
  location.replace(destino);
})();
</script>
</body>
</html>
